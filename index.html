    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-main: #222222;
            --text-label: #555555;
            --input-border: #eeeeee;
            --input-bg: #f8f9fa;
            --section-title: #999999;
            --result-bg: #f8f9fa;
            --matrix-display-bg: #ffffff;
            --btn-copy-bg: #ffffff;
            --btn-copy-border: #dddddd;
            --btn-copy-color: #555555;
            --success-green: #28a745;
            --shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-label: #bbbbbb;
            --input-border: #333333;
            --input-bg: #252525;
            --section-title: #888888;
            --result-bg: #252525;
            --matrix-display-bg: #181818;
            --btn-copy-bg: #333333;
            --btn-copy-border: #444444;
            --btn-copy-color: #ffffff;
            --shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 10px;
            transition: background-color 0.3s, color 0.3s;
            box-sizing: border-box;
        }

        .container {
            background: var(--container-bg);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 480px;
            position: relative;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        /* --- THEME TOGGLE (ABSOLUTE TO CONTAINER) --- */
        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-label);
            transition: all 0.2s;
            z-index: 10;
        }
        .theme-toggle:hover { border-color: #3498db; }

        .sun-icon { display: none; }
        [data-theme="dark"] .moon-icon { display: none; }
        [data-theme="dark"] .sun-icon { display: block; }

        .header-logo {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px auto;
            display: block;
        }

        .preview-container {
            width: 100%;
            height: 80px;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            overflow: hidden;
            border: 1px solid var(--input-border);
            background: #333;
        }

        .preview-half {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 8px;
            font-size: 0.65rem;
            font-weight: bold;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
        }

        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.8rem; color: var(--text-label); }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--input-border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text-main);
            text-align: center;
            font-family: monospace;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #3498db; }
        
        .matrix-input { font-size: 0.75rem !important; }

        input[type="range"] { 
            width: 100%; 
            cursor: pointer; 
            margin: 10px 0;
            accent-color: #3498db;
        }

        .section-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--section-title);
            margin: 1.2rem 0 0.6rem;
            border-bottom: 1px solid var(--input-border);
            padding-bottom: 4px;
        }

        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .color-dot {
            height: 28px;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .color-dot:active { transform: scale(0.9); }

        .custom-preset-row {
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--input-bg);
            padding: 8px;
            border-radius: 10px;
            border: 1px solid var(--input-border);
        }

        .picker-wrapper { width: 45px; height: 38px; position: relative; flex-shrink: 0; }
        #customPresetBtn {
            width: 100%; height: 100%; border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.2); cursor: pointer;
        }
        #hiddenColorPicker { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }

        .result-area {
            background: var(--result-bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-top: 1.5rem;
            border: 1px solid var(--input-border);
        }

        .hex-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .hex-display { font-size: 1.5rem; font-weight: 800; color: var(--text-main); font-family: monospace; }
        
        .matrix-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .matrix-display {
            flex: 1;
            font-family: 'Consolas', monospace;
            font-size: 0.65rem;
            color: var(--text-label);
            background: var(--matrix-display-bg);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--input-border);
            word-break: break-all;
            text-align: left;
            line-height: 1.4;
        }

        .copy-icon-btn {
            width: 36px; height: 36px; padding: 8px;
            background: var(--btn-copy-bg);
            border: 1px solid var(--btn-copy-border);
            border-radius: 8px;
            cursor: pointer;
            color: var(--btn-copy-color);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .copy-icon-btn.success {
            background-color: var(--success-green) !important;
            color: white !important;
            border-color: var(--success-green) !important;
        }

        @media (max-width: 480px) {
            .container { padding: 1.2rem; }
            .hex-display { font-size: 1.3rem; }
            .grid { gap: 4px; }
            .color-dot { height: 25px; }
        }
    </style>
</head>

<script>
    const hexInput = document.getElementById('hexInput');
    const matrixInput = document.getElementById('matrixInput');
    const hueRange = document.getElementById('hueRange');
    const originalPreview = document.getElementById('originalPreview');
    const newPreview = document.getElementById('newPreview');
    const hexOutput = document.getElementById('hexOutput');
    const matrixOutput = document.getElementById('matrixOutput');
    const presetGrid = document.getElementById('presetGrid');
    const customPresetHex = document.getElementById('customPresetHex');
    const customPresetBtn = document.getElementById('customPresetBtn');
    const hiddenColorPicker = document.getElementById('hiddenColorPicker');

    let currentS = 0, currentL = 0;
    const presetHues = [0, 30, 60, 90, 120, 145, 180, 210, 240, 270, 300, 330];

    function toggleTheme() {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', next);
        localStorage.setItem('shifter-theme', next);
    }

    const savedTheme = localStorage.getItem('shifter-theme');
    if (savedTheme) {
        document.body.setAttribute('data-theme', savedTheme);
    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.body.setAttribute('data-theme', 'dark');
    }

    function hslToHex(h, s, l) {
        l /= 100;
        const a = s * Math.min(l, 1 - l) / 100;
        const f = n => {
            const k = (n + h / 30) % 12;
            const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
            return Math.round(255 * color);
        };
        const r = f(0), g = f(8), b = f(4);
        return {
            hex: `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`.toUpperCase(),
            matrix: `0 0 0 0 ${(r/255).toFixed(6)} 0 0 0 0 ${(g/255).toFixed(6)} 0 0 0 0 ${(b/255).toFixed(6)} 0 0 0 1 0`
        };
    }

    function hexToHSL(hex) {
        let r = 0, g = 0, b = 0;
        if (hex.length === 4) {
            r = parseInt(hex[1] + hex[1], 16); g = parseInt(hex[2] + hex[2], 16); b = parseInt(hex[3] + hex[3], 16);
        } else if (hex.length === 7) {
            r = parseInt(hex.substring(1, 3), 16); g = parseInt(hex.substring(3, 5), 16); b = parseInt(hex.substring(5, 7), 16);
        }
        r /= 255; g /= 255; b /= 255;
        let max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) h = s = 0; else {
            let d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return { h: h * 360, s: s * 100, l: l * 100 };
    }

    function matrixToHex(matrixStr) {
        const parts = matrixStr.trim().split(/\s+/);
        if (parts.length >= 15) {
            const r = Math.round(parseFloat(parts[4]) * 255);
            const g = Math.round(parseFloat(parts[9]) * 255);
            const b = Math.round(parseFloat(parts[14]) * 255);
            if (!isNaN(r) && !isNaN(g) && !isNaN(b)) {
                return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`.toUpperCase();
            }
        }
        return null;
    }

    function updateColor() {
        const mainHex = hexInput.value;
        if (!/^#([0-9A-F]{3}){1,2}$/i.test(mainHex)) return;
        const h = parseInt(hueRange.value);
        const res = hslToHex(h, currentS, currentL);
        newPreview.style.backgroundColor = res.hex;
        hexOutput.innerText = res.hex;
        matrixOutput.innerText = res.matrix;
    }

    function processMainHex(val) {
        if (/^#([0-9A-F]{3}){1,2}$/i.test(val)) {
            const hsl = hexToHSL(val);
            currentS = hsl.s; currentL = hsl.l;
            originalPreview.style.backgroundColor = val;
            updateColor();
        } else {
            originalPreview.style.backgroundColor = 'transparent';
            newPreview.style.backgroundColor = 'transparent';
            hexOutput.innerText = '#------';
        }
    }

    hexInput.addEventListener('input', (e) => processMainHex(e.target.value));
    matrixInput.addEventListener('input', (e) => {
        const hex = matrixToHex(e.target.value);
        if (hex) { hexInput.value = hex; processMainHex(hex); }
    });

    presetHues.forEach(h => {
        const dot = document.createElement('div');
        dot.className = 'color-dot';
        dot.style.backgroundColor = `hsl(${h}, 70%, 50%)`;
        dot.onclick = () => { 
            const res = hslToHex(h, 70, 50);
            customPresetHex.value = res.hex;
            updateCustomPreview(res.hex);
            hueRange.value = h;
            updateColor();
        };
        presetGrid.appendChild(dot);
    });

    function updateCustomPreview(hex) {
        if (/^#([0-9A-F]{3}){1,2}$/i.test(hex)) {
            customPresetBtn.style.backgroundColor = hex;
            hiddenColorPicker.value = hex.length === 4 ? `#${hex[1]}${hex[1]}${hex[2]}${hex[2]}${hex[3]}${hex[3]}` : hex;
        }
    }

    customPresetHex.addEventListener('input', (e) => {
        updateCustomPreview(e.target.value);
        if (/^#([0-9A-F]{3}){1,2}$/i.test(e.target.value)) {
            hueRange.value = hexToHSL(e.target.value).h;
            updateColor();
        }
    });

    customPresetBtn.onclick = () => hiddenColorPicker.click();
    hiddenColorPicker.addEventListener('input', (e) => {
        const val = e.target.value.toUpperCase();
        customPresetHex.value = val;
        customPresetBtn.style.backgroundColor = val;
        hueRange.value = hexToHSL(val).h;
        updateColor();
    });

    hueRange.addEventListener('input', updateColor);

    function copyText(elementId, btnId) {
        const text = document.getElementById(elementId).innerText;
        const btn = document.getElementById(btnId);
        if (text.includes('-')) return;
        navigator.clipboard.writeText(text).then(() => {
            const originalInner = btn.innerHTML;
            btn.classList.add('success');
            btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
            setTimeout(() => {
                btn.classList.remove('success');
                btn.innerHTML = originalInner;
            }, 1000);
        });
    }
</script>
</body>
</html>
